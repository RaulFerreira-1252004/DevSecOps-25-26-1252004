[control]
ansible ansible_connection=local

[appservers]
app ansible_host=192.168.56.11 ansible_user=vagrant ansible_ssh_private_key_file=/vagrant/.vagrant/machines/app/virtualbox/private_key

[dbservers]
h2 ansible_host=192.168.56.12 ansible_user=vagrant ansible_ssh_private_key_file=/vagrant/.vagrant/machines/h2/virtualbox/private_key

[all:vars]
ansible_python_interpreter=/usr/bin/python3
host_key_checking=False